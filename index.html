<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Memories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #cdeffd 0%, #a8d8ea 45%, #7fc4e0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating liquid-glass blobs in the background */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.55;
            z-index: -1;
            animation: float 18s ease-in-out infinite;
        }

        .blob.one   { width: 420px; height: 420px; top: -120px; left: -80px;
                      background: radial-gradient(circle at 30% 30%, #e3f6ff, #8fd3f4); }
        .blob.two   { width: 360px; height: 360px; bottom: -100px; right: -60px;
                      background: radial-gradient(circle at 30% 30%, #d4f0ff, #6bb6d6);
                      animation-delay: -6s; }
        .blob.three { width: 300px; height: 300px; top: 40%; left: 60%;
                      background: radial-gradient(circle at 30% 30%, #ffffff, #aee0f5);
                      animation-delay: -12s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(40px, -30px) scale(1.08); }
            66%      { transform: translate(-30px, 20px) scale(0.95); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(99, 161, 196, 0.25),
                        inset 0 1px 1px rgba(255, 255, 255, 0.6);
        }

        h1 {
            color: #3a7a93;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.6);
        }

        .subtitle {
            color: #5a9fbf;
            font-size: 1.2em;
            font-weight: 300;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px) saturate(150%);
            -webkit-backdrop-filter: blur(10px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 24px rgba(99, 161, 196, 0.22),
                        inset 0 1px 1px rgba(255, 255, 255, 0.55);
            padding: 8px;
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                        box-shadow 0.35s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 18px 40px rgba(99, 161, 196, 0.4),
                        inset 0 1px 1px rgba(255, 255, 255, 0.7);
        }

        .gallery-item img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            border-radius: 12px;
        }

        .gallery-item video {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            border-radius: 12px;
        }

        .overlay {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            background: rgba(58, 122, 147, 0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 0 0 12px 12px;
            padding: 15px;
            color: white;
            font-size: 0.9em;
            transform: translateY(110%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .overlay {
            transform: translateY(0);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(122, 180, 205, 0.3);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 90%;
            height: 100%;
            max-width: 900px;
        }

        .modal-content img,
        .modal-content video {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close {
            position: absolute;
            right: 30px;
            top: 20px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .close:hover {
            transform: scale(1.2);
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 24px;
            color: #3a7a93;
            font-size: 0.95em;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(14px) saturate(150%);
            -webkit-backdrop-filter: blur(14px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(99, 161, 196, 0.2),
                        inset 0 1px 1px rgba(255, 255, 255, 0.55);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 15px;
            }

            .gallery-item img,
            .gallery-item video {
                height: 180px;
            }
        }
    </style>
</head>

            if (item.type === 'image') {
                content = `<img src="photos/${item.name}" alt="Pet photo">`;
            } else {
                content = `<video><source src="photos/${item.name}" type="video/mp4"></video>`;
            }

            galleryItem.innerHTML = content + '<div class="overlay"></div>';

            galleryItem.addEventListener('click', function() {
                modal.style.display = 'block';
                if (item.type === 'image') {
                    modalContent.innerHTML = `<img src="photos/${item.name}" alt="Pet photo">`;
                } else {
                    modalContent.innerHTML = `<video controls><source src="photos/${item.name}" type="video/mp4"></video>`;
                }
            });

            gallery.appendChild(galleryItem);
        });

        // Modal functionality
        closeBtn.addEventListener('click', function() {
            modal.style.display = 'none';
        });

        window.addEventListener('click', function(event) {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
